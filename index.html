<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>음식 룰렛</title>

  <script>
    window.APP_VERSION = "1.0.11";
  </script>

  <link rel="stylesheet" id="mainCss">
</head>
<body>

  <header class="app-header">
    <div class="menu-icon">-</div>
    <h1>동남보건대학교</h1>
  </header>

  <main class="app-container">

    <h2 class="main-title">음식 맞히기!</h2>

    <section class="roulette-section">
      <div class="pointer"></div>

      <canvas id="rouletteCanvas" width="600" height="600"></canvas>

      <button id="spinCenterButton" class="center-spin-button">
        돌리기
      </button>
    </section>

    <button id="spinButton" class="main-spin-button">
      룰렛 돌리기!
    </button>

    <section class="result-box">
      <p class="result-label">음식 맞히기!</p>
      <p id="resultText" class="result-text">룰렛을 돌려보세요!</p>
      <img id="resultImage" class="result-image" alt="선택된 음식 이미지" />
    </section>

  </main>

  <audio id="spinSound" src="./sounds/spin.mp3" preload="auto"></audio>
  <audio id="winSound" src="./sounds/win.mp3" preload="auto"></audio>

  <script type="module">
    const version = window.APP_VERSION;

    document.getElementById("mainCss").href =
      `./css/style.css?v=${version}`;

    import(`./js/app.js?v=${version}`);
  </script>
</body>
</html>
